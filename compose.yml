services:
  postgres:
    image: postgres:16-alpine
    container_name: loja-filtros-postgres
    environment:
      POSTGRES_DB: loja_filtros
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - loja_filtros_postgres:/var/lib/postgresql/data

volumes:
  loja_filtros_postgres:
