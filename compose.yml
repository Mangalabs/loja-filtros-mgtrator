services:
  backend:
    build:
      context: ./backend
    container_name: loja-filtros-backend
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_NO_SANDBOX: "true"
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${BACKEND_HOST_PORT:-3333}:3333"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: loja-filtros-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be configured}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be configured}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be configured}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - loja_filtros_postgres:/var/lib/postgresql/data

volumes:
  loja_filtros_postgres:
