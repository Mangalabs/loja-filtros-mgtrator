services:
  postgres:
    image: postgres:16-alpine
    container_name: loja-filtros-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be configured}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be configured}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be configured}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - loja_filtros_postgres:/var/lib/postgresql/data

volumes:
  loja_filtros_postgres:
